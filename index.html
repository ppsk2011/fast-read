<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Identity -->
    <title>ReadSwift — RSVP Speed Reader | PDF, EPUB, DOCX, TXT, MD, HTML, RTF, SRT | 60-1500 WPM</title>
    <meta name="description" content="ReadSwift: RSVP speed reader supporting PDF, EPUB, DOCX, TXT, Markdown, HTML, RTF, SRT. Read at 60-1500 WPM with intelligent phrase chunking, cross-device sync, and 4 reading profiles. Free, offline, no tracking. PWA + Android + iOS." />
    <meta name="author" content="Techscript Limited" />
    <meta name="application-name" content="ReadSwift" />

    <!-- Theme -->
    <meta name="theme-color" content="#060606" />
    <meta name="color-scheme" content="dark" />
    <meta name="msapplication-navbutton-color" content="#060606" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- PWA / iOS web app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ReadSwift" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://readswift.techscript.ca" />
    <meta property="og:title" content="ReadSwift — RSVP Speed Reader" />
    <meta property="og:description" content="Read PDF, EPUB, DOCX, TXT, MD, HTML, RTF, SRT at 60-1500 WPM. No account. No data collection. Free." />
    <meta property="og:site_name" content="ReadSwift by Techscript Limited" />

    <!-- GoatCounter analytics — free, privacy-friendly visitor tracking -->
    <script
      data-goatcounter="https://readswift.goatcounter.com/count"
      async
      src="https://gc.zgo.at/count.js"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
