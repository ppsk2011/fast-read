name: Build iOS

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Capacitor sync
        run: |
          npx cap add ios
          npx cap sync ios

      - name: Deploy custom iOS icons
        run: |
          ICON_SRC="release-package/icons/ios"
          APPICONSET="ios/App/App/Assets.xcassets/AppIcon.appiconset"

          mkdir -p "$APPICONSET"

          # Copy icon PNG files if they exist
          for icon in \
            "icon-20@2x.png" \
            "icon-20@3x.png" \
            "icon-29@2x.png" \
            "icon-29@3x.png" \
            "icon-40@2x.png" \
            "icon-40@3x.png" \
            "icon-60@2x.png" \
            "icon-60@3x.png" \
            "icon-1024.png"; do
            src="$ICON_SRC/$icon"
            [ -f "$src" ] && cp "$src" "$APPICONSET/$icon"
          done

          # Create Contents.json referencing all icon sizes
          cat > "$APPICONSET/Contents.json" <<'EOF'
          {
            "images" : [
              {
                "size" : "20x20",
                "idiom" : "iphone",
                "filename" : "icon-20@2x.png",
                "scale" : "2x"
              },
              {
                "size" : "20x20",
                "idiom" : "iphone",
                "filename" : "icon-20@3x.png",
                "scale" : "3x"
              },
              {
                "size" : "29x29",
                "idiom" : "iphone",
                "filename" : "icon-29@2x.png",
                "scale" : "2x"
              },
              {
                "size" : "29x29",
                "idiom" : "iphone",
                "filename" : "icon-29@3x.png",
                "scale" : "3x"
              },
              {
                "size" : "40x40",
                "idiom" : "iphone",
                "filename" : "icon-40@2x.png",
                "scale" : "2x"
              },
              {
                "size" : "40x40",
                "idiom" : "iphone",
                "filename" : "icon-40@3x.png",
                "scale" : "3x"
              },
              {
                "size" : "60x60",
                "idiom" : "iphone",
                "filename" : "icon-60@2x.png",
                "scale" : "2x"
              },
              {
                "size" : "60x60",
                "idiom" : "iphone",
                "filename" : "icon-60@3x.png",
                "scale" : "3x"
              },
              {
                "size" : "1024x1024",
                "idiom" : "ios-marketing",
                "filename" : "icon-1024.png",
                "scale" : "1x"
              }
            ],
            "info" : {
              "version" : 1,
              "author" : "xcode"
            }
          }
          EOF

      - name: Build (unsigned, for CI validation)
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      # For a real App Store build, configure signing via secrets:
      # https://docs.github.com/en/actions/deployment/deploying-xcode-applications
      #
      # - name: Build signed IPA (tags only)
      #   if: startsWith(github.ref, 'refs/tags/v')
      #   ...
