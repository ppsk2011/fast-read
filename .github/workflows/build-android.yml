name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Setup Java (required by Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK components
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Capacitor sync
        run: |
          npx cap add android
          npx cap sync android

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Deploy custom Android icons
        run: |
          # Create mipmap directories
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26

          for DENSITY in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            FG="release-package/icons/ic_launcher_foreground.${DENSITY}.png"
            BG="release-package/icons/ic_launcher_background.${DENSITY}.png"
            OUT_DIR="android/app/src/main/res/mipmap-${DENSITY}"

            if [ -f "$FG" ] && [ -f "$BG" ]; then
              # Copy adaptive layers
              cp "$FG" "$OUT_DIR/ic_launcher_foreground.png"
              cp "$BG" "$OUT_DIR/ic_launcher_background.png"
              echo "✓ Copied adaptive layers for ${DENSITY}"
            fi
          done

          # Copy adaptive icon XML
          if [ -f "release-package/icons/ic_launcher.xml" ]; then
            cp release-package/icons/ic_launcher.xml android/app/src/main/res/mipmap-anydpi-v26/
            cp release-package/icons/ic_launcher_round.xml android/app/src/main/res/mipmap-anydpi-v26/
            echo "✓ Copied adaptive icon XML"
          fi

          # Generate legacy ic_launcher.png at each density by compositing fg over bg.
          # These override the Capacitor placeholder and display on Android <8 and
          # any launcher that bypasses adaptive icons.
          #
          # Correct legacy icon sizes (dp × density factor):
          #   mdpi=48, hdpi=72, xhdpi=96, xxhdpi=144, xxxhdpi=192
          declare -A LEGACY_SIZE=(
            ["mdpi"]="48"
            ["hdpi"]="72"
            ["xhdpi"]="96"
            ["xxhdpi"]="144"
            ["xxxhdpi"]="192"
          )

          for DENSITY in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            SIZE="${LEGACY_SIZE[$DENSITY]}"
            FG="release-package/icons/ic_launcher_foreground.${DENSITY}.png"
            BG="release-package/icons/ic_launcher_background.${DENSITY}.png"
            OUT_DIR="android/app/src/main/res/mipmap-${DENSITY}"

            if [ -f "$FG" ] && [ -f "$BG" ]; then
              # Build a single composite once to avoid double-resize work:
              # resize background to legacy size, composite foreground centered on top.
              COMPOSITE_TMP="$OUT_DIR/ic_launcher_tmp.png"
              convert "$BG" -resize "${SIZE}x${SIZE}!" \
                \( "$FG" -resize "${SIZE}x${SIZE}!" \) \
                -gravity center -composite \
                "$COMPOSITE_TMP"

              # Square legacy icon — just copy the composite
              cp "$COMPOSITE_TMP" "$OUT_DIR/ic_launcher.png"

              # Round icon — apply circle mask to the composite.
              # Circle formula: center = (SIZE/2, SIZE/2); radius point = (SIZE/2, 0)
              # which gives radius = SIZE/2, producing a circle that fills the canvas.
              convert "$COMPOSITE_TMP" \
                \( +clone -threshold 0 -negate \
                   -draw "fill white circle $((SIZE/2)),$((SIZE/2)) $((SIZE/2)),0" \
                   -alpha off \) \
                -compose copy_opacity -composite \
                "$OUT_DIR/ic_launcher_round.png"

              rm "$COMPOSITE_TMP"

              echo "✓ Generated ic_launcher.png (${SIZE}x${SIZE}) for ${DENSITY}"
            else
              echo "⚠ Missing icon files for ${DENSITY}, skipping legacy generation"
            fi
          done

          echo "✓ All Android icons deployed"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: paceread-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # On tagged releases, build a signed release AAB (Android App Bundle)
      # AAB is required by Google Play; it lets the store optimise downloads per device.
      - name: Build release AAB (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.jks
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=app/release.jks \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Upload release AAB artifact (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: paceread-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90
