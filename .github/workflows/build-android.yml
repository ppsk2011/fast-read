name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Setup Java (required by Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK components
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Capacitor sync
        run: |
          npx cap add android
          npx cap sync android

      - name: Copy custom Android icons
        run: |
          set -e
          RES=android/app/src/main/res
          ICONS=release-package/icons

          # Create mipmap directories
          mkdir -p \
            "$RES/mipmap-mdpi" \
            "$RES/mipmap-hdpi" \
            "$RES/mipmap-xhdpi" \
            "$RES/mipmap-xxhdpi" \
            "$RES/mipmap-xxxhdpi" \
            "$RES/mipmap-anydpi-v26"

          copy_if_exists() {
            if [ -f "$1" ]; then
              cp "$1" "$2"
              echo "Copied $1 -> $2"
            else
              echo "Skipped (not found): $1"
            fi
          }

          # Copy foreground icons
          copy_if_exists "$ICONS/ic_launcher_foreground.mdpi.png"    "$RES/mipmap-mdpi/ic_launcher_foreground.png"
          copy_if_exists "$ICONS/ic_launcher_foreground.hdpi.png"    "$RES/mipmap-hdpi/ic_launcher_foreground.png"
          copy_if_exists "$ICONS/ic_launcher_foreground.xhdpi.png"   "$RES/mipmap-xhdpi/ic_launcher_foreground.png"
          copy_if_exists "$ICONS/ic_launcher_foreground.xxhdpi.png"  "$RES/mipmap-xxhdpi/ic_launcher_foreground.png"
          copy_if_exists "$ICONS/ic_launcher_foreground.xxxhdpi.png" "$RES/mipmap-xxxhdpi/ic_launcher_foreground.png"

          # Copy background icons
          copy_if_exists "$ICONS/ic_launcher_background.mdpi.png"    "$RES/mipmap-mdpi/ic_launcher_background.png"
          copy_if_exists "$ICONS/ic_launcher_background.hdpi.png"    "$RES/mipmap-hdpi/ic_launcher_background.png"
          copy_if_exists "$ICONS/ic_launcher_background.xhdpi.png"   "$RES/mipmap-xhdpi/ic_launcher_background.png"
          copy_if_exists "$ICONS/ic_launcher_background.xxhdpi.png"  "$RES/mipmap-xxhdpi/ic_launcher_background.png"
          copy_if_exists "$ICONS/ic_launcher_background.xxxhdpi.png" "$RES/mipmap-xxxhdpi/ic_launcher_background.png"

          # Copy adaptive icon XML files
          copy_if_exists "$ICONS/ic_launcher.xml"       "$RES/mipmap-anydpi-v26/ic_launcher.xml"
          copy_if_exists "$ICONS/ic_launcher_round.xml" "$RES/mipmap-anydpi-v26/ic_launcher_round.xml"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fast-read-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # On tagged releases, build a signed release AAB (Android App Bundle)
      # AAB is required by Google Play; it lets the store optimise downloads per device.
      - name: Build release AAB (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.jks
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=app/release.jks \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Upload release AAB artifact (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: fast-read-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90
